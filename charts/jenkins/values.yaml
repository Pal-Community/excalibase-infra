controller:
  initContainerEnv:
    - name: JAVA_OPTS
      value: "-Xmx1024m"

  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    hostName: jenkins.excalibase.io
    tls:
      - secretName: jenkins-tls
        hosts:
          - jenkins.excalibase.io

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Agent pods spin up on-demand per pipeline run
agent:
  enabled: true
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi

persistence:
  enabled: true
  storageClass: local-path
  size: 10Gi
