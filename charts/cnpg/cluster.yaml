apiVersion: v1
kind: ConfigMap
metadata:
  name: pg-stat-statements-queries
  namespace: postgres
data:
  queries.yaml: |
    pg_stat_statements:
      query: |
        SELECT
          userid::regrole as username,
          dbid,
          query,
          calls,
          total_exec_time,
          mean_exec_time,
          rows
        FROM pg_stat_statements
        WHERE query NOT LIKE '%pg_stat_statements%'
        ORDER BY total_exec_time DESC
        LIMIT 20
      metrics:
        - username:
            usage: "LABEL"
            description: "User who ran the query"
        - dbid:
            usage: "LABEL"
            description: "Database OID"
        - query:
            usage: "LABEL"
            description: "Query text"
        - calls:
            usage: "COUNTER"
            description: "Number of times executed"
        - total_exec_time:
            usage: "COUNTER"
            description: "Total execution time (ms)"
        - mean_exec_time:
            usage: "GAUGE"
            description: "Mean execution time (ms)"
        - rows:
            usage: "COUNTER"
            description: "Total rows returned"
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  namespace: postgres
spec:
  instances: 3

  storage:
    size: 20Gi
    storageClass: local-path

  postgresql:
    parameters:
      shared_preload_libraries: "pg_stat_statements"
      pg_stat_statements.track: "all"
      max_connections: "200"

  monitoring:
    enablePodMonitor: true
    customQueriesConfigMap:
      - name: pg-stat-statements-queries
        key: queries.yaml

  affinity:
    topologyKey: kubernetes.io/hostname

  bootstrap:
    initdb:
      database: excalibase
      owner: excalibase

  resources:
    requests:
      cpu: 1000m
      memory: 1Gi
    limits:
      cpu: 3000m
      memory: 3Gi
