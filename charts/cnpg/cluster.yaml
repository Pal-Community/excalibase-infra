apiVersion: v1
kind: ConfigMap
metadata:
  name: pg-stat-statements-queries
  namespace: postgres
data:
  queries.yaml: |
    pg_stat_statements:
      query: |
        SELECT
          userid::regrole as username,
          dbid,
          query,
          calls,
          total_exec_time,
          mean_exec_time,
          rows
        FROM pg_stat_statements
        WHERE query NOT LIKE '%pg_stat_statements%'
        ORDER BY total_exec_time DESC
        LIMIT 20
      metrics:
        - username:
            usage: "LABEL"
            description: "User who ran the query"
        - dbid:
            usage: "LABEL"
            description: "Database OID"
        - query:
            usage: "LABEL"
            description: "Query text"
        - calls:
            usage: "COUNTER"
            description: "Number of times executed"
        - total_exec_time:
            usage: "COUNTER"
            description: "Total execution time (ms)"
        - mean_exec_time:
            usage: "GAUGE"
            description: "Mean execution time (ms)"
        - rows:
            usage: "COUNTER"
            description: "Total rows returned"
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  namespace: postgres
spec:
  instances: 3

  storage:
    size: 20Gi
    storageClass: local-path

  postgresql:
    parameters:
      shared_preload_libraries: "pg_stat_statements"
      pg_stat_statements.track: "all"
      max_connections: "200"

  monitoring:
    enablePodMonitor: true
    customQueriesConfigMap:
      - name: pg-stat-statements-queries
        key: queries.yaml

  affinity:
    topologyKey: kubernetes.io/hostname

  backup:
    barmanObjectStore:
      destinationPath: s3://excalibase-dev-backup/asian/
      endpointURL: https://s3.ap-south-1.amazonaws.com
      s3Credentials:
        accessKeyId:
          name: cnpg-s3-creds
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-s3-creds
          key: SECRET_ACCESS_KEY
      wal:
        compression: gzip
      data:
        compression: gzip
        jobs: 2
    retentionPolicy: "30d"

  bootstrap:
    initdb:
      database: excalibase
      owner: excalibase

  resources:
    requests:
      cpu: 1000m
      memory: 1Gi
    limits:
      cpu: 3000m
      memory: 3Gi
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: postgres-daily
  namespace: postgres
spec:
  schedule: "0 0 2 * * *"
  backupOwnerReference: self
  cluster:
    name: postgres
