grafana:
  enabled: true
  adminPassword: "WD_Xd34ncEuJ3dZ"
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod

    hosts:
      - grafana.excalibase.io
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.excalibase.io
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki:3100
      access: proxy
  dashboards:
    cnpg:
      cloudnative-pg:
        gnetId: 20417
        datasource: Prometheus
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: cnpg
          folder: PostgreSQL
          type: file
          options:
            path: /var/lib/grafana/dashboards/cnpg

prometheus:
  prometheusSpec:
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

prometheusOperator:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
