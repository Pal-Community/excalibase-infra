grafana:
  enabled: true
  adminPassword: "WD_Xd34ncEuJ3dZ"
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod

    hosts:
      - grafana.excalibase.io
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.excalibase.io
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki:3100
      access: proxy
    - name: Tempo
      type: tempo
      url: http://tempo.monitoring.svc.cluster.local:3100
      access: proxy
      jsonData:
        tracesToLogsV2:
          datasourceUid: loki
          spanStartTimeShift: "-1m"
          spanEndTimeShift: "1m"
          filterByTraceID: true
        serviceMap:
          datasourceUid: prometheus
        nodeGraph:
          enabled: true
  dashboards:
    cnpg:
      cloudnative-pg:
        gnetId: 20417
        datasource: Prometheus
    excalibase:
      excalibase-overview:
        url: https://raw.githubusercontent.com/excalibase/excalibase-graphql/main/observability/grafana/dashboards/excalibase-overview.json
        datasource: Prometheus
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: cnpg
          folder: PostgreSQL
          type: file
          options:
            path: /var/lib/grafana/dashboards/cnpg
        - name: excalibase
          folder: Excalibase
          type: file
          options:
            path: /var/lib/grafana/dashboards/excalibase

prometheus:
  prometheusSpec:
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

prometheusOperator:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
